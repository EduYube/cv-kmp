name: iOS Bootstrap (Manual)

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SwiftUI iOS project
        run: |
          mkdir -p iosApp
          cd iosApp
          mkdir -p CVKMPiOS
          cd CVKMPiOS
          swift package init --type executable

      - name: Show generated structure
        run: |
          ls -R iosApp